services:
  - type: web
    name: nayepankh-volunteer-nexus
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt && python seed_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
